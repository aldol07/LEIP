

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    volumes:
      - ./:/app
    env_file:
      - .env
    command: /bin/sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - redis

  workers:
    image: node:20-alpine
    working_dir: /app/workers
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000/api/v1/internal
    command: /bin/sh -c "npm install && node src/index.js"
    ports:
      - "3001:3001"
    depends_on:
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
      - VITE_WS_BASE_URL=ws://localhost:8000/api/v1
    command: /bin/sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
